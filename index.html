<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ashok Digital Services | બેસ્ટ ઓનલાઈન સરકારી અને ડિજિટલ સેવાઓ</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #0b4c8c;
            --secondary-color: #198754;
            --bg-main: #f4f6f9;
            --bg-card: #ffffff;
            --text-main: #333333;
        }

        /* ગૂગલ ટ્રાન્સલેટના વધારાના બારને દૂર કરવા */
        .goog-te-banner-frame.skiptranslate { display: none !important; }
        body { top: 0px !important; }
        #google_translate_element { display: none; }

        /* બાકીની તમારી સ્ટાઈલ અહીં રહેશે (કોડ લાંબો ન થાય તે માટે મેં મુખ્ય ભાગ દર્શાવ્યો છે) */
        /* ... ઉપર આપેલી તમારી બધી જ CSS સ્ટાઈલ અહીં લખો ... */
    </style>
</head>
<body>

    <!-- Header Section -->
    <header>
        <div class="navbar">
            <a href="#home" class="logo-container">
                <div class="logo-text">ASHOK DIGITAL SERVICES</div>
            </a>
            <nav>
                <ul>
                    <li><a href="#home">હોમ</a></li>
                    <li><a href="#services">સેવાઓ</a></li>
                    
                    <!-- લેંગ્વેજ સિલેક્ટર -->
                    <li>
                        <div class="lang-selector-container">
                            <select id="langSelectDropdown" class="lang-select-custom" onchange="changeLanguage(this.value)">
                                <option value="gu">ગુજરાતી</option>
                                <option value="en">English</option>
                                <option value="hi">Hindi</option>
                            </select>
                        </div>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- ગૂગલ ટ્રાન્સલેટ એલિમેન્ટ (છુપાયેલું) -->
    <div id="google_translate_element"></div>

    <script type="text/javascript">
        // ગૂગલ ટ્રાન્સલેટ ઇનિશિયલાઇઝેશન
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'gu',
                includedLanguages: 'gu,en,hi',
                autoDisplay: false
            }, 'google_translate_element');
        }

        // ભાષા બદલવાનું ફંક્શન
        function changeLanguage(lang) {
            var selectField = document.querySelector("select.goog-te-combo");
            if (selectField) {
                selectField.value = lang;
                selectField.dispatchEvent(new Event('change'));
            } else {
                alert("ભાષા સેટિંગ લોડ થઈ રહ્યું છે, થોડી સેકન્ડ રાહ જુઓ.");
            }
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <!-- બાકીનું તમામ HTML કન્ટેન્ટ અહીં મૂકો -->

</body>
</html>
