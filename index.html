<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ashok Digital Services | સ્ટેટસ ચેક કરો</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* (પહેલાનું બધું સ્ટાઇલિંગ અહીં રાખવું, મેં સ્ટેટસ માટે નવું ઉમેર્યું છે) */
        :root { --primary-color: #0b4c8c; --secondary-color: #198754; }
        
        .status-section { padding: 80px 20px; background: #fff; text-align: center; }
        .status-box { max-width: 500px; margin: 0 auto; padding: 30px; background: #eef2f7; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .status-box input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        .status-box button { background: var(--primary-color); color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #statusResult { margin-top: 20px; font-weight: bold; color: #d9534f; }
        
        /* બાકીનું સ્ટાઇલિંગ જૂનું જ છે, તે જ રાખવું */
    </style>
</head>
<body>

    <!-- [ઉપરનું બધું જૂનું સ્ટ્રક્ચર સેમ રાખવું] -->

    <!-- 🆕 સ્ટેટસ ચેકર સેક્શન -->
    <section id="status" class="status-section">
        <h2 class="section-title">તમારી એપ્લિકેશનનું સ્ટેટસ ચેક કરો</h2>
        <div class="status-box">
            <p>તમારો મોબાઈલ નંબર અથવા એપ્લિકેશન આઈડી દાખલ કરો:</p>
            <input type="text" id="userInput" placeholder="દા.ત. 9484418910">
            <button onclick="checkStatus()">સ્ટેટસ જુઓ</button>
            <div id="statusResult"></div>
        </div>
    </section>

    <script>
        // અહીં તમારા ગ્રાહકોની યાદી છે. તમારે ફક્ત અહીં નંબર અને સ્ટેટસ બદલવાનું રહેશે.
        const database = {
            "9484418910": "તમારું પાસપોર્ટનું કામ પ્રોસેસમાં છે.",
            "9876543210": "તમારું ITR ફાઈલિંગ પૂર્ણ થઈ ગયું છે.",
            "1234567890": "તમારું પાન કાર્ડ બની ગયું છે, કલેક્ટ કરી લો."
        };

        function checkStatus() {
            const input = document.getElementById('userInput').value;
            const resultDiv = document.getElementById('statusResult');
            
            if (database[input]) {
                resultDiv.innerHTML = "સ્ટેટસ: " + database[input];
                resultDiv.style.color = "#198754"; // લીલો રંગ
            } else {
                resultDiv.innerHTML = "માફ કરશો, આ નંબર માટે કોઈ માહિતી મળતી નથી.";
                resultDiv.style.color = "#d9534f"; // લાલ રંગ
            }
        }
    </script>

    <!-- [બાકીનું નીચેનું જૂનું સેક્શન] -->
</body>
</html>
